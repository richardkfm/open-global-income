<!--
  Kenya Counties — Schematic Grid Layout
  Approach: 7-column × 7-row rectangular grid (47 cells, 2 omitted from last row).
  Geographic accuracy is intentionally sacrificed for file-size and simplicity.
  Each county is represented as a fixed-size rect with data-region matching the
  IDs in src/data/regions.json (KE-{REGIONCODE}).
  Counties are arranged in a rough north→south, west→east order:
    Row 0 (far north): TUR, SAM, MAR, WAJ, MAN, — , —
    Row 1 (north):     WPO, BAR, ISI, GAR, MAN, — , —
    Row 2 (rift):      TNZ, LAI, LAM, GAR, — , — , —
    Row 3 (central-w): UGI, NAK, NYA, MER, THN, ISI, LAM
    Row 4 (western):   EMN, NAN, KER, KIR, EMB, TAN, —
    Row 5 (nyanza):    KAK, VIH, BOM, NAR, MAC, KIT, —
    Row 6 (coast/nbi): BUN, BUS, SIA, HOM, MIG, KSI, NYM
  Final rows: KIS, KIA, MUR, NYE, MAK, MOM, KIL
              NAI, KAJ, — , — , TAS, KWA, —
  Note: some liberties taken to fit 47 counties into 7x7=49 minus 2 empty cells.
  Interaction: click any county to navigate to /admin/regions/KE-{code}
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350" width="350" height="350"
     role="img" aria-label="Kenya counties choropleth map">
  <title>Kenya Counties</title>
  <!-- Row 0: far north -->
